<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正弦定理視覺化證明</title>
  
  <!-- 載入 React 核心函式庫 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- 載入 Babel (讓瀏覽器能看得懂 JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 載入 Tailwind CSS (處理畫面排版與顏色) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- React 應用程式會被渲染在這個 div 裡面 -->
  <div id="root"></div>

  <!-- 注意這裡的 type 是 text/babel -->
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [step, setStep] = useState(0);

      // SVG 座標點設定
      const A = { x: 80, y: 250 };
      const B = { x: 420, y: 250 };
      const C = { x: 180, y: 50 };
      const D = { x: 180, y: 250 }; // 垂足 1
      const E = { x: 148, y: 114 }; // 垂足 2 (B 到 AC 的高)

      const nextStep = () => setStep((s) => Math.min(s + 1, 7));
      const prevStep = () => setStep((s) => Math.max(s - 1, 0));

      // 客製化分數顯示元件
      const Fraction = ({ num, den, highlight }) => (
        <div className={`inline-flex flex-col items-center justify-center align-middle mx-2 text-xl font-serif ${highlight ? 'text-blue-600 font-bold' : 'text-slate-800'}`}>
          <span className="border-b-2 border-current px-2 leading-tight">{num}</span>
          <span className="px-2 leading-tight">{den}</span>
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 md:p-8 font-sans">
          <div className="bg-white rounded-2xl shadow-xl overflow-hidden max-w-5xl w-full flex flex-col lg:flex-row">
            
            {/* 左側：SVG 視覺化區域 */}
            <div className="lg:w-3/5 p-8 bg-slate-50 flex flex-col items-center justify-center border-b lg:border-b-0 lg:border-r border-slate-200">
              <svg viewBox="0 0 500 300" className="w-full max-w-lg drop-shadow-sm">
                {/* 基礎三角形底色 */}
                <polygon 
                  points={`${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`} 
                  fill={step === 0 || step === 1 || step === 4 || step === 5 || step === 7 ? "#f1f5f9" : "none"} 
                  className="transition-colors duration-500"
                />

                {/* 步驟 2：左側直角三角形反白 */}
                <polygon 
                  points={`${A.x},${A.y} ${D.x},${D.y} ${C.x},${C.y}`} 
                  fill="#bfdbfe" // blue-200
                  className={`transition-opacity duration-500 ${step === 2 ? 'opacity-100' : 'opacity-0'}`}
                />

                {/* 步驟 3：右側直角三角形反白 */}
                <polygon 
                  points={`${B.x},${B.y} ${D.x},${D.y} ${C.x},${C.y}`} 
                  fill="#bbf7d0" // green-200
                  className={`transition-opacity duration-500 ${step === 3 ? 'opacity-100' : 'opacity-0'}`}
                />

                {/* 步驟 6：下方直角三角形 (BEA) 反白 */}
                <polygon 
                  points={`${B.x},${B.y} ${E.x},${E.y} ${A.x},${A.y}`} 
                  fill="#fef08a" // yellow-200
                  className={`transition-opacity duration-500 ${step === 6 ? 'opacity-100' : 'opacity-0'}`}
                />

                {/* 步驟 6：上方直角三角形 (BEC) 反白 */}
                <polygon 
                  points={`${C.x},${C.y} ${E.x},${E.y} ${B.x},${B.y}`} 
                  fill="#fed7aa" // orange-200
                  className={`transition-opacity duration-500 ${step === 6 ? 'opacity-100' : 'opacity-0'}`}
                />

                {/* 繪製主三角形邊框 */}
                <polygon 
                  points={`${A.x},${A.y} ${B.x},${B.y} ${C.x},${C.y}`} 
                  fill="none" 
                  stroke="#1e293b" 
                  strokeWidth="3" 
                  strokeLinejoin="round"
                />

                {/* 角 A 弧線 (步驟 2, 6, 7 顯示) */}
                <path 
                  d="M 120 250 A 40 40 0 0 0 98 214" 
                  fill="none" 
                  stroke="#2563eb" 
                  strokeWidth="3"
                  className={`transition-opacity duration-500 ${step === 2 || step === 4 || step === 6 || step === 7 ? 'opacity-100' : 'opacity-0'}`}
                />
                
                {/* 角 B 弧線 (步驟 3, 4, 7 顯示) */}
                <path 
                  d="M 380 250 A 40 40 0 0 1 389 224" 
                  fill="none" 
                  stroke="#16a34a" 
                  strokeWidth="3"
                  className={`transition-opacity duration-500 ${step === 3 || step === 4 || step === 7 ? 'opacity-100' : 'opacity-0'}`}
                />

                {/* 角 C 弧線 (步驟 6, 7 顯示) */}
                <path 
                  d="M 162 85 A 40 40 0 0 0 210 75" 
                  fill="none" 
                  stroke="#f97316" 
                  strokeWidth="3"
                  className={`transition-opacity duration-500 ${step === 6 || step === 7 ? 'opacity-100' : 'opacity-0'}`}
                />

                {/* 繪製高 h1 (步驟 1~4 顯示) */}
                <g className={`transition-opacity duration-500 ${(step >= 1 && step <= 4) ? 'opacity-100' : 'opacity-0'}`}>
                  <line 
                    x1={C.x} y1={C.y} 
                    x2={D.x} y2={D.y} 
                    stroke="#ef4444" 
                    strokeWidth="3" 
                    strokeDasharray="6,6"
                  />
                  {/* 直角標記 */}
                  <polyline points="180,235 195,235 195,250" fill="none" stroke="#ef4444" strokeWidth="2" />
                  <polyline points="180,235 165,235 165,250" fill="none" stroke="#ef4444" strokeWidth="2" />
                  <text x="160" y="160" fontSize="22" fontWeight="bold" fill="#ef4444" fontStyle="italic">h₁</text>
                </g>

                {/* 繪製高 h2 (步驟 5~6 顯示) */}
                <g className={`transition-opacity duration-500 ${(step >= 5 && step <= 6) ? 'opacity-100' : 'opacity-0'}`}>
                  <line 
                    x1={B.x} y1={B.y} 
                    x2={E.x} y2={E.y} 
                    stroke="#8b5cf6" 
                    strokeWidth="3" 
                    strokeDasharray="6,6"
                  />
                  {/* 直角標記 */}
                  <polyline points="154.7,100.6 168.1,107.3 161.4,120.7" fill="none" stroke="#8b5cf6" strokeWidth="2" />
                  <text x="260" y="170" fontSize="22" fontWeight="bold" fill="#8b5cf6" fontStyle="italic">h₂</text>
                </g>

                {/* 頂點標籤 */}
                <text x={A.x - 20} y={A.y + 10} fontSize="22" fontWeight="bold" fill="#1e293b">A</text>
                <text x={B.x + 10} y={B.y + 10} fontSize="22" fontWeight="bold" fill="#1e293b">B</text>
                <text x={C.x - 5} y={C.y - 15} fontSize="22" fontWeight="bold" fill="#1e293b">C</text>

                {/* 邊長標籤 */}
                <text 
                  x="240" y="280" 
                  fontSize="22" fontStyle="italic" fontWeight="bold" 
                  className={`transition-colors duration-300 ${step === 0 ? 'fill-slate-800' : (step >= 6 ? 'fill-purple-600' : 'fill-slate-400')}`}
                >c</text>
                <text 
                  x="110" y="140" 
                  fontSize="22" fontStyle="italic" fontWeight="bold" 
                  className={`transition-colors duration-300 ${step === 2 || step === 4 ? 'fill-blue-600' : 'fill-slate-500'}`}
                >b</text>
                <text 
                  x="310" y="140" 
                  fontSize="22" fontStyle="italic" fontWeight="bold" 
                  className={`transition-colors duration-300 ${step === 3 || step === 4 || step === 6 || step === 7 ? 'fill-green-600' : 'fill-slate-500'}`}
                >a</text>
              </svg>
            </div>

            {/* 右側：推導邏輯與控制面板 */}
            <div className="lg:w-2/5 p-8 flex flex-col justify-between">
              <div>
                <h2 className="text-2xl font-bold text-slate-800 mb-6 border-b pb-4">正弦定理推導</h2>
                
                <div className="space-y-6 relative">
                  {/* 步驟 0 */}
                  <div className={`transition-all duration-300 ${step === 0 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-slate-800 mb-2">準備：考慮一個任意三角形</h3>
                    <p className="text-slate-600 leading-relaxed">
                      考慮一個三角形 <span className="font-serif italic">ABC</span>。我們知道它的三個頂點，以及對應的三條邊 <span className="font-serif italic">a, b, c</span>。
                    </p>
                  </div>

                  {/* 步驟 1 */}
                  <div className={`transition-all duration-300 ${step === 1 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-red-600 mb-2">第一步：作高</h3>
                    <p className="text-slate-600 leading-relaxed">
                      從頂點 <span className="font-serif italic">C</span> 向對邊 <span className="font-serif italic">c</span> 作一條垂直線，我們稱這條「高」為 <span className="font-serif italic font-bold text-red-500">h₁</span>。這條高將原本的三角形切成了兩個直角三角形。
                    </p>
                  </div>

                  {/* 步驟 2 */}
                  <div className={`transition-all duration-300 ${step === 2 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-blue-600 mb-2">第二步：觀察左側</h3>
                    <p className="text-slate-600 leading-relaxed mb-4">
                      在左側的藍色直角三角形中，利用基礎三角函數定義（對邊 ÷ 斜邊）：
                    </p>
                    <div className="bg-blue-50 p-4 rounded-lg text-center font-serif text-xl text-blue-900 border border-blue-100">
                      sin(A) = <Fraction num="h₁" den="b" /> <br/>
                      <div className="mt-3 font-bold">
                        h₁ = b · sin(A)
                      </div>
                    </div>
                  </div>

                  {/* 步驟 3 */}
                  <div className={`transition-all duration-300 ${step === 3 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-green-600 mb-2">第三步：觀察右側</h3>
                    <p className="text-slate-600 leading-relaxed mb-4">
                      同理，在右側的綠色直角三角形中，我們再次利用基礎三角函數定義：
                    </p>
                    <div className="bg-green-50 p-4 rounded-lg text-center font-serif text-xl text-green-900 border border-green-100">
                      sin(B) = <Fraction num="h₁" den="a" /> <br/>
                      <div className="mt-3 font-bold">
                        h₁ = a · sin(B)
                      </div>
                    </div>
                  </div>

                  {/* 步驟 4 */}
                  <div className={`transition-all duration-300 ${step === 4 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-slate-700 mb-2">第四步：等量代換</h3>
                    <p className="text-slate-600 leading-relaxed mb-4">
                      既然左右兩邊算出來的 <span className="font-serif italic font-bold text-red-500">h₁</span> 是同一條線，我們就可以將兩個式子等號相連：
                    </p>
                    <div className="bg-slate-50 p-4 rounded-lg text-center font-serif text-lg text-slate-800 border border-slate-200">
                      <span className="text-blue-700">b · sin(A)</span> = <span className="text-red-600">h₁</span> = <span className="text-green-700">a · sin(B)</span>
                      <div className="my-3 border-t border-slate-200 w-3/4 mx-auto"></div>
                      <div className="flex items-center justify-center">
                        <span className="mr-2">整理後得：</span>
                        <Fraction num="a" den="sin(A)" highlight />
                        <span className="mx-2">=</span>
                        <Fraction num="b" den="sin(B)" highlight />
                      </div>
                    </div>
                  </div>

                  {/* 步驟 5 */}
                  <div className={`transition-all duration-300 ${step === 5 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-purple-600 mb-2">第五步：推廣——換個頂點作高</h3>
                    <p className="text-slate-600 leading-relaxed">
                      為了將第三條邊 <span className="font-serif italic">c</span> 與角 <span className="font-serif italic">C</span> 關聯起來，我們回到原本的三角形。這次我們改從頂點 <span className="font-serif italic">B</span> 向對邊 <span className="font-serif italic">b</span> 作另一條垂直線，稱為 <span className="font-serif italic font-bold text-purple-500">h₂</span>。
                    </p>
                  </div>

                  {/* 步驟 6 */}
                  <div className={`transition-all duration-300 ${step === 6 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-purple-600 mb-2">第六步：觀察新的直角三角形</h3>
                    <p className="text-slate-600 leading-relaxed mb-2">
                      同樣地，這條新高 <span className="font-serif italic font-bold text-purple-500">h₂</span> 產生了兩個新的直角三角形。
                    </p>
                    <div className="bg-purple-50 p-3 rounded-lg text-center font-serif text-lg text-purple-900 border border-purple-100 space-y-3">
                      <div className="flex justify-around items-center">
                        <div>
                          <span className="text-sm block text-slate-500 mb-1">黃色三角形</span>
                          sin(A) = h₂ / c<br/>
                          <span className="font-bold">h₂ = c · sin(A)</span>
                        </div>
                        <div className="w-px h-12 bg-purple-200"></div>
                        <div>
                          <span className="text-sm block text-slate-500 mb-1">橘色三角形</span>
                          sin(C) = h₂ / a<br/>
                          <span className="font-bold">h₂ = a · sin(C)</span>
                        </div>
                      </div>
                      <div className="border-t border-purple-200 pt-2 flex items-center justify-center">
                        <span className="mr-2">代換整理得：</span>
                        <Fraction num="a" den="sin(A)" highlight />
                        <span className="mx-2">=</span>
                        <Fraction num="c" den="sin(C)" highlight />
                      </div>
                    </div>
                  </div>

                  {/* 步驟 7 */}
                  <div className={`transition-all duration-300 ${step === 7 ? 'opacity-100 transform translate-x-0' : 'opacity-0 hidden'}`}>
                    <h3 className="text-lg font-bold text-indigo-600 mb-2">最終結論：完整的正弦定理</h3>
                    <p className="text-slate-600 leading-relaxed mb-4">
                      結合前面步驟得到的結果，我們成功將三角形的三個角與三條邊全部串聯起來了！這就是幾何學中極為優雅的正弦定理。
                    </p>
                    <div className="bg-indigo-50 p-5 rounded-lg text-center font-serif text-xl text-indigo-900 border-2 border-indigo-200 shadow-inner">
                      <div className="flex items-center justify-center font-bold">
                        <Fraction num="a" den="sin(A)" highlight />
                        <span className="mx-3 text-2xl">=</span>
                        <Fraction num="b" den="sin(B)" highlight />
                        <span className="mx-3 text-2xl">=</span>
                        <Fraction num="c" den="sin(C)" highlight />
                      </div>
                    </div>
                  </div>

                </div>
              </div>

              {/* 控制按鈕 */}
              <div className="mt-8 flex justify-between items-center pt-4 border-t border-slate-200">
                <button 
                  onClick={prevStep} 
                  disabled={step === 0}
                  className={`px-5 py-2.5 rounded-lg font-medium transition-all ${step === 0 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-white text-slate-700 hover:bg-slate-50 border border-slate-300 shadow-sm'}`}
                >
                  上一步
                </button>
                
                <div className="flex space-x-1 sm:space-x-2">
                  {[0, 1, 2, 3, 4, 5, 6, 7].map((i) => (
                    <div key={i} className={`h-2 w-2 rounded-full transition-colors ${step === i ? 'bg-slate-800' : 'bg-slate-300'}`} />
                  ))}
                </div>

                <button 
                  onClick={nextStep} 
                  disabled={step === 7}
                  className={`px-5 py-2.5 rounded-lg font-medium transition-all ${step === 7 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-md shadow-indigo-200'}`}
                >
                  {step === 6 ? '完成證明' : '下一步'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // 將 App 渲染到網頁上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
